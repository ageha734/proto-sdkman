name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Build WASM plugin
        run: cargo build --target wasm32-wasip1 --release

      - name: Compute checksum
        run: |
          cd target/wasm32-wasip1/release
          sha256sum proto_sdkman.wasm > proto_sdkman.wasm.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@7b4da11513bf3f43f9999e90eabced41ab8bb048 # v2.2.3
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(inputs.tag, '-alpha') || contains(inputs.tag, '-beta') || contains(inputs.tag, '-rc') }}
          files: |
            target/wasm32-wasip1/release/proto_sdkman.wasm
            target/wasm32-wasip1/release/proto_sdkman.wasm.sha256
