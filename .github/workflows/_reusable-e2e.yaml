name: E2E

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    name: "E2E (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Build WASM plugin
        run: cargo build --target wasm32-wasip1 --release

      - name: Setup proto
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true

      - name: Configure plugin
        shell: bash
        run: |
          mkdir -p ~/.proto
          cat > ~/.proto/.prototools <<'PROTOEOF'
          [plugins]
          sdkman-test = "file://TARGET_PATH/proto_sdkman.wasm"
          PROTOEOF
          sed -i'' -e "s|TARGET_PATH|$(pwd)/target/wasm32-wasip1/release|g" ~/.proto/.prototools

      - name: Run E2E - proto install
        run: proto install sdkman-test

      - name: Verify installation
        run: proto run sdkman-test -- version
