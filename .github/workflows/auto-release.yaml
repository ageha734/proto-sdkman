name: Auto Release

on:
  push:
    branches:
      - master

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@909cc5acb0fdd60627fb858598759246509fa755 # v2.0.2
        with:
          deno-version: v2.x

      - name: Determine version
        id: version
        run: |
          VERSION=$(deno run --allow-run --allow-read --allow-env .github/scripts/release/determine-version.ts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Determined version: $VERSION"

      - name: Update Cargo.toml version
        if: steps.version.outputs.version != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Create Release PR
        if: steps.version.outputs.version != ''
        uses: peter-evans/create-pull-request@5e914681df9dc83ce4b23e24e62ab8cb23d52f9f # v7.0.8
        with:
          branch: release/v${{ steps.version.outputs.version }}
          title: "chore(release): v${{ steps.version.outputs.version }}"
          body: |
            ## Release v${{ steps.version.outputs.version }}

            This is an automated release PR. Merging will trigger a tag and release.
          commit-message: "chore(release): v${{ steps.version.outputs.version }}"
          labels: release
